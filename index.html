<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A web</title>
  
<style>
body {
  font-family: Arial, sans-serif;
  margin: 40px;
}

.rating-container {
  position: relative;
  width: 300px;
  min-height: 220px;
}

/* safer positioning so reset doesn't collide with message */
#submitBtn {
  position: absolute;
  left: 0;
  top: 80px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.green {
  background: green;
  color: white;
}

/* message now sits BELOW natural flow, not inside button zone */
#message {
  margin-top: 110px;
  min-height: 40px;
}

#extraLink {
  margin-top: 10px;
}

/* ===== EMOTION EFFECTS (RESTORED) ===== */

.red-glow {
  box-shadow: 0 0 12px red;
  background: darkred !important;
}

.shake {
  animation: shake 0.25s infinite;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  50% { transform: translateX(3px); }
  75% { transform: translateX(-3px); }
  100% { transform: translateX(0); }
}

.fire::after {
  content: "🔥";
  position: absolute;
  right: -18px;
  top: -10px;
  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
  from { transform: scale(1); opacity: 0.6; }
  to { transform: scale(1.2); opacity: 1; }
}

.beg {
  animation: beg 1s infinite;
}

@keyframes beg {
  0% { transform: scale(1); }
  50% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<h1>Rating System</h1>
<h3>This is a web, please rate it one to ten. (for better expirience start rating at 0)</h3>
  
<div class="rating-container">

<select id="rating">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
  <option value="6">6</option>
  <option value="7">7</option>
  <option value="8">8</option>
  <option value="9">9</option>
  <option value="10">10</option>
</select>

<br><br>

<button id="submitBtn">Submit</button>

<div id="message"></div>
<div id="extraLink"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const rating = document.getElementById("rating");
  const button = document.getElementById("submitBtn");
  const message = document.getElementById("message");
  const extraLink = document.getElementById("extraLink");

  function reset() {
    message.textContent = "";
    button.className = "";
    button.style.left = "0px";
    button.style.top = "80px";
    extraLink.innerHTML = "";
  }

  function confetti() {
    for (let i = 0; i < 40; i++) {
      const d = document.createElement("div");
      d.style.position = "fixed";
      d.style.width = "6px";
      d.style.height = "6px";
      d.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
      d.style.left = Math.random() * window.innerWidth + "px";
      d.style.top = "-10px";
      document.body.appendChild(d);

      d.animate(
        [{ transform: "translateY(0)" }, { transform: "translateY(100vh)" }],
        { duration: 1500 }
      ).onfinish = () => d.remove();
    }
  }

  // escape behavior (0)
  button.addEventListener("mouseover", () => {
    if (rating.value === "0") {
      button.style.left = Math.random()*200 + "px";
      button.style.top = Math.random()*100 + "px";
    }
  });

  button.addEventListener("click", function (e) {
    e.preventDefault();

    const v = rating.value;

    reset();

    // ===== EMOTIONAL RESPONSES RESTORED =====

    if (v === "0") {
      message.textContent = "No.";
      return;
    }

    if (v === "1") {
      message.textContent = "You made the button cry! How can you be so mean as to give him a 1?!";
      return;
    }

    if (v === "2") {
      message.textContent = "An error! A totally legit and not fake error that just won't let you give a score as low as 2...";
      button.classList.add("red-glow", "shake");
      return;
    }

    if (v === "3") {
      message.textContent = "It turns out 3 is the button's least favourite number, so he jsut won't let you submit it.";
      button.classList.add("red-glow", "shake", "fire");
      return;
    }

    if (v === "4") {
      message.textContent = "4 is almost a 5, don't be stingy! the button doesn't like stingy people and won't let you submit it.";
      button.classList.add("beg");
      return;
    }

    if (v === "5") {
      message.textContent = "Oh, the button is looking at a fly passing by and is too distracted to submit the option";
      return;
    }

    if (v === "6") {
      message.textContent = "You thought youd trick us?! That is just 3+3! The three is the button's least favourite number";
      button.classList.add("red-glow", "shake");
      return;
    }

    if (v === "7") {
      message.textContent = "why is 6 afraid of 7? because 789.";
      button.classList.add("shake");
      return;
    }

    if (v === "8") {
      message.textContent = "Nope.";
      button.classList.add("shake");
      return;
    }

    // 9 and 10 untouched (as requested)

    if (v === "9") {
      message.textContent = "Upgrading...";
      setTimeout(() => {
        rating.value = "10";
      }, 500);
      return;
    }

    if (v === "10") {
      message.textContent = "OK";
      button.classList.add("green");
      confetti();

      extraLink.innerHTML =
        '<a href="blog.html">Read how this was made</a>';
      return;
    }

  });

});
</script>

</body>
</html>
