<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rating System</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 40px;
}

.rating-container {
  position: relative;
  width: 300px;
  height: 200px;
}

#submitBtn {
  position: absolute;
  left: 0;
  top: 80px;
  padding: 10px;
  cursor: pointer;
}

.green {
  background: green;
  color: white;
}

#message {
  margin-top: 60px;
}

#extraLink {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Rating System</h1>

<div class="rating-container">

<select id="rating">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
  <option value="6">6</option>
  <option value="7">7</option>
  <option value="8">8</option>
  <option value="9">9</option>
  <option value="10">10</option>
</select>

<br><br>

<button id="submitBtn">Submit</button>

<div id="message"></div>
<div id="extraLink"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const rating = document.getElementById("rating");
  const button = document.getElementById("submitBtn");
  const message = document.getElementById("message");
  const extraLink = document.getElementById("extraLink");

  function reset() {
    message.textContent = "";
    button.className = "";
    button.style.left = "0px";
    button.style.top = "80px";
    extraLink.innerHTML = "";
  }

  function confetti() {
    for (let i = 0; i < 40; i++) {
      const d = document.createElement("div");
      d.style.position = "fixed";
      d.style.width = "6px";
      d.style.height = "6px";
      d.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
      d.style.left = Math.random() * window.innerWidth + "px";
      d.style.top = "-10px";
      document.body.appendChild(d);

      d.animate(
        [{ transform: "translateY(0)" }, { transform: "translateY(100vh)" }],
        { duration: 1500 }
      ).onfinish = () => d.remove();
    }
  }

  // escape button for 0
  button.addEventListener("mouseover", () => {
    if (rating.value === "0") {
      button.style.left = Math.random()*200 + "px";
      button.style.top = Math.random()*100 + "px";
    }
  });

  button.addEventListener("click", function (e) {
    e.preventDefault();

    const v = rating.value;

    reset();

    // ===== YOUR JOKES GO HERE =====
    // Replace ONLY the text below with your exact original jokes

    if (v === "0") {
      message.textContent = "No.";
      return;
    }

    if (v === "1") {
      message.textContent = "Button is crying.";
      return;
    }

    if (v === "2") {
      message.textContent = "Choose higher.";
      return;
    }

    if (v === "3") {
      message.textContent = "No way.";
      return;
    }

    if (v === "4") {
      message.textContent = "Almost 5.";
      return;
    }

    if (v === "5") {
      message.textContent = "Why not higher?";
      return;
    }

    if (v === "6") {
      message.textContent = "Double 3.";
      return;
    }

    if (v === "7") {
      message.textContent = "haha nice try.";
      return;
    }

    if (v === "8") {
      message.textContent = "Nope.";
      return;
    }

    if (v === "9") {
      message.textContent = "Upgrading...";
      setTimeout(() => {
        rating.value = "10";
      }, 500);
      return;
    }

    if (v === "10") {
      message.textContent = "OK";
      button.classList.add("green");
      confetti();

      extraLink.innerHTML =
        '<a href="blog.html">Read how this was made</a>';
      return;
    }

  });

});
</script>

</body>
</html>
