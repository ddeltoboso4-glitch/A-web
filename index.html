<script>
document.addEventListener("DOMContentLoaded", function () {

  const rating = document.getElementById("rating");
  const button = document.getElementById("submitBtn");
  const message = document.getElementById("message");
  const extraLink = document.getElementById("extraLink");

  function reset() {
    message.textContent = "";
    button.className = "";
    button.style.left = "0px";
    button.style.top = "80px";
    extraLink.innerHTML = "";
  }

  function confetti() {
    for (let i = 0; i < 40; i++) {
      const d = document.createElement("div");
      d.style.position = "fixed";
      d.style.width = "6px";
      d.style.height = "6px";
      d.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
      d.style.left = Math.random() * window.innerWidth + "px";
      d.style.top = "-10px";

      document.body.appendChild(d);

      d.animate(
        [{ transform: "translateY(0)" }, { transform: "translateY(100vh)" }],
        { duration: 1500 }
      ).onfinish = () => d.remove();
    }
  }

  // 0 → escape button
  button.addEventListener("mouseover", () => {
    if (rating.value === "0") {
      button.style.left = Math.random() * 200 + "px";
      button.style.top = Math.random() * 100 + "px";
    }
  });

  // CLICK LOGIC
  button.addEventListener("click", function (e) {
    e.preventDefault();

    const v = rating.value;

    reset();

    if (v === "0") {
      message.textContent = "No.";
      return;
    }

    if (v === "10") {
      message.textContent = "OK";
      button.classList.add("green");
      confetti();

      extraLink.innerHTML =
        '<a href="blog.html">Read how this was made</a>';
      return;
    }

    // everything else (temporary simple fallback)
    message.textContent = "Pick another number.";
  });

});
</script>
